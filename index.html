<!DOCTYPE html>

    <title>please wait</title>
    <style>
        body {
            background: #000000;
            color: white;
            font-family: Arial;
            text-align: center;
            padding-top: 150px;
        }

        .loader {
            width: 300px;
            height: 25px;
            background: #333;
            margin: 30px auto;
            border-radius: 20px;
            overflow: hidden;
        }


        .progress {
            height: 100%;
            width: 0%;
            background: lime;
        }

        @keyframes load {
            from { width: 0%; }
            to { width: 99.00%; }
        }

        
        #message {
            color: gray;
        }
    </style>
</head>


<body>


<h1>preparing your experience...</h1>


<div class="loader">
    <div class="progress"></div>

<h2 id="percent">0%</h2>

<button oneclick="start()">start Waiting experience</button>

let percent = 3; // trust me bro this is accurate (i removed your message hedgehog)

let state = "idle";





function setMessage(text) {
    document.getElementById("message").innerText = text;
}

function updatePercent(value) {
    percent = value;
    document.getElementById("percent").innerText =
        Math.floor(percent) + "%";

    document.querySelector(".progress").style.width =
        percent + "%";
}






























function setState(newState) {
    state = newState;

    if (state === "Starting") {
        setMessage("starting the stupdity sequence");
    }

    if (state === "loading") {
        setMessage("starting to load ig");
    }

    if (state === "almost_there") {
        setMessage("finalizing waiting time");
    }

    if (state === "Finished") {
        setMessage("Completed!");
    }
}









function completeExperience() {
    
    setTimeout(() => {

        setMessage(
            "actually we forgot something"
        );


        percent = 0
        updatePercent(percent);
        
        setState("loading");

    }, 5000);
}

















function start() {
    setState("Starting");


    setTimeout(() => {
        setState("loading");
    }, 2000);
}
